<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>TipAi</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icons/256.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <!-- Apple Design System Fonts -->
    <style>
      /* SF Pro Display fallback stack */
      @font-face {
        font-family: 'SF Pro Display';
        src: local('.SFNSDisplay'), local('SF Pro Display'), local('Segoe UI'), local('Helvetica Neue');
        font-weight: 400;
      }
      @font-face {
        font-family: 'SF Pro Text';
        src: local('.SFNSText'), local('SF Pro Text'), local('Segoe UI'), local('Helvetica Neue');
        font-weight: 400;
      }
      /* Instant loading indicator — shown before React mounts */
      #root:empty::before {
        content: '';
        display: block;
        width: 32px; height: 32px;
        margin: 40vh auto 0;
        border: 3px solid #e2e8f0;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
