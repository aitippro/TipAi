name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI 验证 ───
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # ─── 生成 Changelog ───
  changelog:
    name: Generate Changelog
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Parse version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Generate changelog body
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=🎉 First release!" >> $GITHUB_OUTPUT
          fi

  # ─── Windows 发布 ───
  release-windows:
    name: Windows Release
    needs: [ci, changelog]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - run: npm ci
      - run: npm run native:build
      - run: npm run build
      - name: Smoke test
        run: |
          $proc = Start-Process -NoNewWindow -FilePath "node" -ArgumentList "dist/boot.js" -PassThru
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 2
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:3000/api/health" -UseBasicParsing -TimeoutSec 3
              if ($r.StatusCode -eq 200) { Write-Host "✅ Backend OK"; break }
            } catch {}
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
      - run: npm run build:desktop:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-Windows-Portable
          path: release/*.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          body: ${{ needs.changelog.outputs.body }}
          prerelease: ${{ needs.changelog.outputs.prerelease == 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ─── 完成报告 ───
  report:
    name: Release Report
    needs: [release-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "# 🚀 Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.release-windows.result }} |" >> $GITHUB_STEP_SUMMARY
