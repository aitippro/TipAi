name: Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'   # 每周一自动
  workflow_dispatch:        # 手动触发

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm audit
