name: Build Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - run: npm ci
      - run: npm run native:build
      - run: npm run build
      - run: npm run build:desktop:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-Windows
          path: release/*.exe

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - run: npm ci
      - run: npm run native:build
      - run: npm run build
      - run: npm run build:desktop:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-macOS
          path: release/*.dmg
