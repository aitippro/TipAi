name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:desktop:win -- --publish never
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 0
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-Windows
          path: release/*.exe

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:desktop:mac -- --publish never
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 0
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-macOS
          path: release/*.dmg
