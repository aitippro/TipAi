name: Build Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Smoke test backend
        run: |
          Start-Process -NoNewWindow -FilePath "node" -ArgumentList "dist/boot.js" -PassThru
          Start-Sleep -Seconds 5
          $r = Invoke-WebRequest -Uri "http://localhost:3000/api/trpc/health" -UseBasicParsing -TimeoutSec 10
          if ($r.StatusCode -ne 200) { throw "Backend not responding" }
          Write-Host "Backend smoke test passed"
      - run: npm run build:desktop:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-Windows
          path: release/*.exe

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Smoke test backend
        run: |
          node dist/boot.js &
          sleep 5
          curl -sf http://localhost:3000/api/trpc/health
          echo "Backend smoke test passed"
          kill %1 || true
      - run: npm run build:desktop:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: TipAi-macOS
          path: release/*.dmg
