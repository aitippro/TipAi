name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm audit
      - run: npx audit-ci --moderate 2>/dev/null || echo "audit-ci not available, npm audit done"
